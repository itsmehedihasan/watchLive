<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5">
  <meta name="theme-color" content="#181818">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LiveTV">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon-192.svg">
  <title>LiveTV — Watch Bangla, Sports &amp; More</title>
  <meta name="description" content="Free live streaming of Bangla, Hindi, Sports, News, Movies and more channels.">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">

    <!-- ── Header ─────────────────────────────────────────────── -->
    <header class="header">
      <button id="sidebarToggle" class="icon-btn header-burger" title="Toggle sidebar">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <button id="homeBtn" class="brand">
        <span class="brand-emoji">📺</span>
        <span class="brand-name">LiveTV</span>
      </button>
      <span id="activeBadge" class="active-badge" hidden>
        <span>👥</span>
        <span><span id="totalViewers">0</span> active</span>
      </span>
    </header>

    <!-- ── Body ───────────────────────────────────────────────── -->
    <div class="body">

      <!-- Left sidebar: browse by category (independent of the country one) -->
      <aside id="categorySidebar" class="sidebar category-sidebar">
        <div class="sidebar-heading">Categories</div>
        <div id="categoryList" class="channel-list">
          <div id="catLoading" class="list-loading">
            <div class="spinner-sm"></div>
            <span>Loading…</span>
          </div>
        </div>
        <div class="sidebar-footer category-footer">
          <button id="healthToggle" class="health-toggle" role="switch" aria-checked="false"
                  title="Probe every stream from the server and hide ones that are offline, blocked or geo-restricted">
            <span class="health-switch"><span class="health-knob"></span></span>
            <span class="health-toggle-label">Working only</span>
          </button>
          <span id="healthStatus" class="health-status" hidden></span>
        </div>
      </aside>

      <!-- Main player area -->
      <main class="main">
        <div class="main-inner">

          <!-- Carousel (shown when no channel selected) -->
          <div id="carousel" class="carousel">
            <div class="carousel-glow"></div>
            <div id="carouselContent" class="carousel-content">
              <div class="carousel-loading">
                <div class="carousel-loading-emoji">📺</div>
                <p>Loading channels…</p>
              </div>
            </div>
            <button id="carouselPrev" class="carousel-arrow carousel-arrow-left" aria-label="Previous channel" hidden>
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button id="carouselNext" class="carousel-arrow carousel-arrow-right" aria-label="Next channel" hidden>
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
            <div id="carouselDots" class="carousel-dots"></div>
          </div>

          <!-- Player (shown when a channel is selected) -->
          <div id="playerSection" hidden>
            <div id="videoContainer" class="video-container">
              <div id="loadingOverlay" class="overlay" hidden>
                <div class="spinner"></div>
                <p class="overlay-muted">Connecting to stream…</p>
              </div>
              <div id="errorOverlay" class="overlay overlay-error" hidden>
                <div class="overlay-emoji">📡</div>
                <p class="error-title">Stream unavailable</p>
                <p class="error-sub">This channel may be offline or geo-restricted</p>
                <button id="retryBtn" class="primary-btn">↺ Retry</button>
              </div>
              <video id="video" controls playsinline></video>
              <div class="video-overlay touch-visible-target">
                <span id="qualityBadge" class="quality-badge" hidden></span>
                <button id="fsBtn" class="overlay-btn" title="Fullscreen (F)">
                  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
                  </svg>
                </button>
              </div>
            </div>

            <!-- Stream options: server picker + quality selector -->
            <div id="streamOptions" class="stream-options" hidden>
              <div id="serverRow" class="server-row" hidden>
                <span class="opt-label">Server</span>
                <div id="serverButtons" class="server-buttons"></div>
              </div>
              <div id="qualityWrap" class="quality-wrap" hidden>
                <label class="opt-label" for="qualitySelect">Quality</label>
                <select id="qualitySelect"></select>
              </div>
            </div>

            <!-- Now Playing bar -->
            <div class="now-playing">
              <img id="npLogo" class="np-logo" alt="" hidden>
              <div id="npLogoFallback" class="np-logo-fallback">📡</div>
              <div class="np-meta">
                <p id="npName" class="np-name"></p>
                <p id="npGroup" class="np-group"></p>
              </div>
              <div class="np-actions">
                <div id="viewerPill" class="viewer-pill" hidden>
                  <span class="viewer-emoji">👥</span>
                  <span id="viewerCount" class="viewer-count"></span>
                  <span class="viewer-watching">watching</span>
                </div>
                <button id="copyBtn" class="copy-btn" title="Copy stream URL to use in your own player">
                  <svg class="copy-icon" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                  </svg>
                  <svg class="copied-icon" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" hidden>
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                  <span class="copy-label">Copy URL</span>
                </button>
                <div class="live-tag">
                  <span class="live-dot"></span>
                  <span class="live-text">Live</span>
                </div>
              </div>
            </div>

            <button id="moreChannels" class="more-channels">More Channels</button>
          </div>

        </div>
      </main>

      <!-- Right sidebar: browse by country (the original list + search + sync) -->
      <aside id="sidebar" class="sidebar country-sidebar">
        <div class="search-wrap">
          <div class="search-box">
            <svg class="search-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input id="search" type="text" placeholder="Search channels…" autocomplete="off">
            <button id="searchClear" class="search-clear" hidden>✕</button>
          </div>
        </div>
        <div id="channelList" class="channel-list">
          <div id="listLoading" class="list-loading">
            <div class="spinner-sm"></div>
            <span>Loading playlist…</span>
          </div>
          <div id="emptyState" class="empty-state" hidden>
            <span class="empty-emoji">😕</span>
            <span>No channels found</span>
            <button id="emptyClear" class="link-btn">Clear search</button>
          </div>
        </div>
        <div class="sidebar-footer">
          <span id="channelCount"></span>
          <button id="syncBtn" class="sync-btn" title="Re-download the channel list from the source">⟳ Sync</button>
        </div>
      </aside>
    </div>
  </div>

  <!-- Full-screen loader shown while the "Working only" probe is running -->
  <div id="healthOverlay" class="health-overlay" hidden>
    <div class="spinner"></div>
    <p class="health-overlay-title">Checking channels…</p>
    <p id="healthOverlayProgress" class="health-overlay-progress overlay-muted"></p>
    <div class="health-overlay-bar"><div id="healthOverlayFill" class="health-overlay-fill"></div></div>
    <p class="health-overlay-hint">Hiding streams that are offline, blocked or geo-restricted</p>
    <button id="healthOverlayHide" class="health-overlay-hide">Hide — keep checking in background</button>
  </div>

  <script src="/static/hls.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
